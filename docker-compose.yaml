##############################################################################
# Hatchet — Coolify-ready Docker Compose
#
# Workflow orchestration engine
# https://github.com/hatchet-dev/hatchet
#
# ── Optional — sensible defaults provided ────────────────────────────────
#   POSTGRES_USER        – DB user                 (default: hatchet)
#   POSTGRES_PASSWORD    – DB password             (default: hatchet)
#   POSTGRES_DB          – DB name                 (default: hatchet)
#   POSTGRES_PORT        – DB host port            (default: 5431)
#   RABBITMQ_USER        – RabbitMQ user           (default: user)
#   RABBITMQ_PASSWORD    – RabbitMQ password       (default: password)
#   RABBITMQ_PORT        – RabbitMQ host port      (default: 5672)
#   RABBITMQ_MGMT_PORT   – RabbitMQ UI port        (default: 15672)
##############################################################################

services:
  postgres:
    image: postgres:15.6
    restart: unless-stopped
    command: postgres -c 'max_connections=500'
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-hatchet}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hatchet}
      - POSTGRES_DB=${POSTGRES_DB:-hatchet}
    volumes:
      - hatchet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hatchet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    volumes:
      - hatchet_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"

volumes:
  hatchet_postgres_data:
  hatchet_rabbitmq_data:
