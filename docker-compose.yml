services:
  app:
    image: ghcr.io/hatchet-dev/hatchet/hatchet-engine:latest
    container_name: hatchet
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - DATABASE_URL=${{DATABASE_URL}}
      - SERVER_URL=${{SERVER_URL}}
      - SERVER_AUTH_COOKIE_DOMAIN=${{SERVER_AUTH_COOKIE_DOMAIN}}
      - SERVER_AUTH_COOKIE_INSECURE=${{SERVER_AUTH_COOKIE_INSECURE}}
      - SERVER_MSGQUEUE_KIND=${{SERVER_MSGQUEUE_KIND}}
      - SERVER_PORT=${{SERVER_PORT}}
      - SERVER_GRPC_PORT=${{SERVER_GRPC_PORT}}
      - SERVER_GRPC_BROADCAST_ADDRESS=${{SERVER_GRPC_BROADCAST_ADDRESS}}
    volumes:
      - app_data:/data
    networks:
      - internal

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hatchet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hatchet}
      POSTGRES_DB: hatchet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  postgres_data:
volumes:
  app_data:

networks:
  internal:
